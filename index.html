<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanush's Birthday Portal 🎂</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; background-color: #000; 
        }

        /* This container makes the 12 pages fill the screen correctly */
        .portal-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Hidden Music Player */
        #birthday-music { display: none; }

        /* Overlay to start the experience (Required for music to play) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; cursor: pointer; text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startPortal()">
        <div>
            <h2 style="color: #ff4d6d;">For Tanush ✨</h2>
            <p>Tap to enter your birthday portal...</p>
        </div>
    </div>

    <audio id="birthday-music" loop>
        <source src="PASTE_YOUR_MUSIC_LINK_HERE" type="audio/mpeg">
    </audio>

    <div class="<div style="position: relative; width: 100%; height: 0; padding-top: 177.7778%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHFJgRgMOg/gYIqvE1Z-oQTNGe0MXtrfg/watch?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHFJgRgMOg&#x2F;gYIqvE1Z-oQTNGe0MXtrfg&#x2F;watch?utm_content=DAHFJgRgMOg&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">Happy Birthday</a> by Shailly ">
        </div>

    <script>
        function startPortal() {
            document.getElementById('birthday-music').play();
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
